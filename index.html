<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RETRO GAME MUSEUM — レトロゲーム機 3D アーカイブ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scanlines"></div>

  <header id="site-header">
    <a href="#" class="logo">
      <span class="logo-icon">▶</span>
      <span class="logo-text">RETRO GAME MUSEUM</span>
    </a>
    <nav>
      <a href="#collection">コレクション</a>
    </nav>
  </header>

  <section id="hero">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-content">
      <div class="hero-tag">3D DIGITAL ARCHIVE</div>
      <h1>RETRO<br>GAME<br>MUSEUM</h1>
      <p class="hero-sub">レトロゲーム機の3Dデジタルアーカイブ</p>
      <a href="#collection" class="hero-cta">コレクションを見る →</a>
    </div>
    <div class="hero-scroll">SCROLL ↓</div>
  </section>

  <main>
    <section id="collection" class="section">
      <div class="section-inner">
        <h2 class="section-title">コレクション</h2>
        <p class="section-desc">ゲーム機をタップすると、3Dビューアーが表示されます。</p>
        <div class="collection-grid" id="collection-grid"></div>
      </div>
    </section>
  </main>

  <div id="viewer-overlay" class="hidden">
    <div id="viewer-container">
      <button id="viewer-close" aria-label="閉じる">✕</button>
      <canvas id="viewer-canvas"></canvas>

      <div id="viewer-info">
        <!-- モバイル用ハンドル（常に表示） -->
        <div class="info-handle">
          <span class="info-handle-name" id="info-handle-name"></span>
          <button class="info-toggle-btn" id="info-toggle-btn" aria-label="詳細を表示">
            <span class="toggle-label">詳細</span>
            <span class="toggle-arrow">▲</span>
          </button>
        </div>

        <!-- スクロール可能なコンテンツ -->
        <div class="info-scroll">
          <div class="info-tag" id="info-tag"></div>
          <h2 id="info-name"></h2>
          <p id="info-name-en"></p>
          <div class="info-meta">
            <div class="meta-item">
              <span class="meta-label">メーカー</span>
              <span class="meta-value" id="info-maker"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">発売年</span>
              <span class="meta-value" id="info-year"></span>
            </div>
          </div>
          <p id="info-desc"></p>
          <div class="trivia-section">
            <div class="trivia-title">💡 豆知識</div>
            <ul class="trivia-list" id="trivia-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo">▶ RETRO GAME MUSEUM</div>
      <p class="footer-copy">3D Models created with Blender. Rendered with Three.js.</p>
    </div>
  </footer>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
